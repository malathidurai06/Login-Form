<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form | Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: gradientBG 10s ease infinite;
            background-size: 200% 200%;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating animation for background elements */
        .floating-shapes {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
        }

        .shape {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 20s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-100px) rotate(180deg); }
        }

        .shape:nth-child(1) {
            width: 100px;
            height: 100px;
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .shape:nth-child(2) {
            width: 150px;
            height: 150px;
            bottom: 10%;
            right: 10%;
            animation-delay: 2s;
        }

        .shape:nth-child(3) {
            width: 70px;
            height: 70px;
            top: 20%;
            right: 20%;
            animation-delay: 4s;
        }

        .shape:nth-child(4) {
            width: 200px;
            height: 200px;
            bottom: 20%;
            left: 5%;
            animation-delay: 6s;
        }

        /* Main Login Container */
        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px 10px 30px 10px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            padding: 40px 30px;
            animation: slideUp 0.8s ease-out;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header with icon */
        .login-header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeIn 1s ease-out 0.3s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .login-header .icon {
            font-size: 60px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .login-header h2 {
            font-size: 2rem;
            color: #333;
            margin-bottom: 5px;
        }

        .login-header p {
            color: #666;
            font-size: 0.9rem;
        }

        /* Input Groups with Animation */
        .input-group {
            position: relative;
            margin-bottom: 30px;
            animation: slideRight 0.5s ease-out;
            animation-fill-mode: both;
        }

        .input-group:nth-child(1) { animation-delay: 0.4s; }
        .input-group:nth-child(2) { animation-delay: 0.6s; }
        .input-group:nth-child(3) { animation-delay: 0.8s; }

        @keyframes slideRight {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .input-group input {
            width: 100%;
            padding: 15px 20px;
            font-size: 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 50px 10px 50px 10px;
            outline: none;
            transition: all 0.3s ease;
            background: white;
        }

        .input-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
            transform: translateY(-2px);
        }

        .input-group label {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            pointer-events: none;
            transition: all 0.3s ease;
            background: white;
            padding: 0 5px;
        }

        .input-group input:focus ~ label,
        .input-group input:valid ~ label {
            top: 0;
            font-size: 0.8rem;
            color: #667eea;
            transform: translateY(-50%);
        }

        /* Floating icon inside input */
        .input-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            transition: all 0.3s ease;
        }

        .input-group input:focus ~ .input-icon {
            color: #667eea;
            transform: translateY(-50%) scale(1.1);
        }

        /* Remember me and Forgot password */
        .login-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            animation: fadeIn 0.5s ease-out 1s both;
            flex-wrap: wrap;
            gap: 10px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #666;
            cursor: pointer;
        }

        .remember-me input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .forgot-link {
            color: #667eea;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            position: relative;
        }

        .forgot-link:hover {
            color: #764ba2;
        }

        .forgot-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: #764ba2;
            transition: width 0.3s ease;
        }

        .forgot-link:hover::after {
            width: 100%;
        }

        /* Login Button with Animation */
        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 50px 10px 50px 10px;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(102, 126, 234, 0); }
            100% { box-shadow: 0 0 0 0 rgba(102, 126, 234, 0); }
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .login-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .login-btn:active {
            transform: translateY(2px);
        }

        /* Sign up link */
        .signup-link {
            text-align: center;
            color: #666;
            font-size: 0.95rem;
            animation: fadeIn 0.5s ease-out 1.2s both;
        }

        .signup-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
            transition: all 0.3s ease;
            position: relative;
        }

        .signup-link a:hover {
            color: #764ba2;
        }

        .signup-link a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: #764ba2;
            transition: width 0.3s ease;
        }

        .signup-link a:hover::after {
            width: 100%;
        }

        /* Social login divider */
        .divider {
            text-align: center;
            margin: 30px 0 20px;
            position: relative;
            animation: fadeIn 0.5s ease-out 1.4s both;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background: linear-gradient(to right, transparent, #ccc, transparent);
        }

        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .divider span {
            background: white;
            padding: 0 10px;
            color: #999;
            font-size: 0.9rem;
        }

        /* Social buttons */
        .social-login {
            display: flex;
            gap: 15px;
            justify-content: center;
            animation: fadeIn 0.5s ease-out 1.6s both;
            flex-wrap: wrap;
        }

        .social-btn {
            flex: 1;
            min-width: 100px;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 50px 5px 50px 5px;
            background: white;
            color: #666;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .social-btn:hover {
            border-color: #667eea;
            color: #667eea;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }

        .social-btn i {
            font-size: 1.2rem;
        }

        /* Responsive Design */
        @media screen and (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }

            .login-header h2 {
                font-size: 1.8rem;
            }

            .input-group input {
                padding: 12px 15px;
            }

            .login-options {
                flex-direction: column;
                align-items: flex-start;
            }

            .social-btn {
                min-width: 100%;
            }
        }

        /* Loading animation */
        .loading {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .login-btn.loading-state {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .login-btn.loading-state .loading {
            display: inline-block;
        }

        /* Error message */
        .error-message {
            color: #ff4444;
            font-size: 0.85rem;
            margin-top: 5px;
            padding-left: 15px;
            animation: shake 0.5s ease;
            display: none;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .error-message.show {
            display: block;
        }

        /* Success message */
        .success-message {
            text-align: center;
            color: #00c851;
            font-size: 0.9rem;
            margin-top: 15px;
            animation: pop 0.5s ease;
            display: none;
        }

        @keyframes pop {
            0% { transform: scale(0); }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .success-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <!-- Floating shapes background -->
    <div class="floating-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <!-- Login Form Container -->
    <div class="login-container">
        <div class="login-header">
            <div class="icon">🔐</div>
            <h2>Welcome Back</h2>
            <p>Please login to your account</p>
        </div>

        <!-- Login Form -->
        <form id="loginForm" onsubmit="return handleLogin(event)">
            <!-- Username/Email Input -->
            <div class="input-group">
                <input type="text" id="username" required>
                <label for="username">Username or Email</label>
                <span class="input-icon">👤</span>
                <div class="error-message" id="usernameError"></div>
            </div>

            <!-- Password Input -->
            <div class="input-group">
                <input type="password" id="password" required>
                <label for="password">Password</label>
                <span class="input-icon">🔒</span>
                <div class="error-message" id="passwordError"></div>
            </div>

            <!-- Options -->
            <div class="login-options">
                <label class="remember-me">
                    <input type="checkbox" id="remember"> Remember me
                </label>
                <a href="#" class="forgot-link">Forgot Password?</a>
            </div>

            <!-- Login Button -->
            <button type="submit" class="login-btn" id="loginBtn">
                <span>Login</span>
                <div class="loading"></div>
            </button>

            <!-- Success Message -->
            <div class="success-message" id="successMessage">
                ✅ Login successful! Welcome back!
            </div>

            <!-- Sign up Link -->
            <div class="signup-link">
                Don't have an account? <a href="#">Sign up</a>
            </div>

            <!-- Divider -->
            <div class="divider">
                <span>Or login with</span>
            </div>

            <!-- Social Login -->
            <div class="social-login">
                <button class="social-btn" onclick="socialLogin('google')">
                    <span>G</span> Google
                </button>
                <button class="social-btn" onclick="socialLogin('facebook')">
                    <span>f</span> Facebook
                </button>
                <button class="social-btn" onclick="socialLogin('github')">
                    <span>⌨️</span> GitHub
                </button>
            </div>
        </form>
    </div>

    <script>
        // Handle login form submission
        function handleLogin(event) {
            event.preventDefault();
            
            // Get values
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            
            // Reset error messages
            document.getElementById('usernameError').classList.remove('show');
            document.getElementById('passwordError').classList.remove('show');
            document.getElementById('successMessage').classList.remove('show');
            
            // Validation
            let isValid = true;
            
            if (username.trim() === '') {
                showError('usernameError', 'Username is required');
                isValid = false;
            } else if (username.length < 3) {
                showError('usernameError', 'Username must be at least 3 characters');
                isValid = false;
            }
            
            if (password.trim() === '') {
                showError('passwordError', 'Password is required');
                isValid = false;
            } else if (password.length < 6) {
                showError('passwordError', 'Password must be at least 6 characters');
                isValid = false;
            }
            
            // If valid, show loading animation
            if (isValid) {
                const loginBtn = document.getElementById('loginBtn');
                loginBtn.classList.add('loading-state');
                loginBtn.disabled = true;
                
                // Simulate API call
                setTimeout(() => {
                    loginBtn.classList.remove('loading-state');
                    loginBtn.disabled = false;
                    
                    // Show success message
                    document.getElementById('successMessage').classList.add('show');
                    
                    // Here you can redirect or do something else
                    console.log('Login successful!', { username, password, remember });
                    
                    // Optional: Clear form
                    // document.getElementById('loginForm').reset();
                }, 2000);
            }
            
            return false;
        }
        
        // Show error message
        function showError(elementId, message) {
            const errorElement = document.getElementById(elementId);
            errorElement.textContent = message;
            errorElement.classList.add('show');
        }
        
        // Handle social login
        function socialLogin(provider) {
            alert(`Login with ${provider} coming soon!`);
            console.log(`Social login with: ${provider}`);
        }
        
        // Add floating label effect on page load
        document.addEventListener('DOMContentLoaded', function() {
            const inputs = document.querySelectorAll('.input-group input');
            
            inputs.forEach(input => {
                // Check if input has value on load
                if (input.value.trim() !== '') {
                    input.classList.add('has-value');
                }
                
                // Add event listener for input
                input.addEventListener('input', function() {
                    if (this.value.trim() !== '') {
                        this.classList.add('has-value');
                    } else {
                        this.classList.remove('has-value');
                    }
                });
            });
        });
        
        // Optional: Add password visibility toggle
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
        }
    </script>
</body>
</html>
